# Default: in-memory H2 database for local development (no external DB required)
# To run against Postgres (e.g. Heroku), uncomment the Postgres settings below and comment out the H2 block.

spring.datasource.url=jdbc:h2:mem:coupons;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

